name: CI

on:
  pull_request:
  push:
    branches: [main, master]
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  lint-test:
    name: lint/test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo clippy (core)
        run: cargo clippy -p something_bg_core --all-targets --all-features -- -D warnings

      - name: cargo test (core)
        run: cargo test -p something_bg_core

      - name: Install GTK deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libgtk-3-dev libayatana-appindicator3-dev libxdo-dev

      - name: cargo check (mac app)
        if: runner.os == 'macOS'
        run: cargo check -p something_bg

      - name: cargo check (linux app)
        if: runner.os == 'Linux'
        run: cargo check -p something_bg_linux

      - name: cargo check (windows app)
        if: runner.os == 'Windows'
        run: cargo check -p something_bg_windows

  build-release-assets:
    name: build release asset (${{ matrix.name }})
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos
            os: macos-latest
            artifact_name: something_bg-macos-universal.zip
          - name: linux
            os: ubuntu-latest
            artifact_name: something_bg-linux-x86_64-unknown-linux-gnu.tar.gz
          - name: windows
            os: windows-latest
            artifact_name: something_bg-windows-x86_64-pc-windows-msvc.zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: release-${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install GTK deps (Linux)
        if: matrix.name == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libgtk-3-dev libayatana-appindicator3-dev libxdo-dev

      - name: Install cargo-bundle (macOS)
        if: matrix.name == 'macos'
        run: cargo install cargo-bundle

      - name: Build and package macOS app
        if: matrix.name == 'macos'
        run: |
          ./scripts/bundle-macos.sh
          ditto -c -k --keepParent "target/release/bundle/osx/Something in the Background.app" "${{ matrix.artifact_name }}"

      - name: Build and package Linux binary
        if: matrix.name == 'linux'
        run: |
          cargo build -p something_bg_linux --release
          tar -C target/release -czf "${{ matrix.artifact_name }}" something_bg_linux

      - name: Build Windows binary
        if: matrix.name == 'windows'
        run: cargo build -p something_bg_windows --release

      - name: Package Windows binary
        if: matrix.name == 'windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "target/release/something_bg_windows.exe" -DestinationPath "${{ matrix.artifact_name }}"

      - name: Upload release asset
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.name }}
          path: ${{ matrix.artifact_name }}
          if-no-files-found: error

  publish-release:
    name: publish release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-release-assets
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: release-*
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
